<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DL Execution">
<meta name="theme-color" content="#0f1520">
<title>DL — Execution Search</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f1520;--surface:#17202e;--card:#1e2a3a;--border:#2a3a50;--accent:#4a7faf;--accent-lt:#6a9fcf;--green:#2e7d4f;--green-lt:#3aaa66;--text:#dce4ef;--sub:#7a8fa8;--radius:14px;--radius-sm:8px;--safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px)}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:16px;-webkit-font-smoothing:antialiased;overscroll-behavior:none}
#app{display:flex;flex-direction:column;min-height:100dvh;padding-top:calc(var(--safe-top) + 12px);padding-bottom:calc(var(--safe-bot) + 20px)}
header{padding:0 20px 16px;border-bottom:1px solid var(--border);margin-bottom:20px}
.eyebrow{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:2px}
header h1{font-size:22px;font-weight:700;line-height:1.15}
header p{font-size:13px;color:var(--sub);margin-top:4px}
main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 16px}
.slabel{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--sub);margin:0 4px 8px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:16px;overflow:hidden}
.nw{padding:14px 16px}
.nw label{display:block;font-size:13px;color:var(--sub);margin-bottom:8px}
textarea{width:100%;min-height:110px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:inherit;font-size:15px;line-height:1.5;padding:10px 12px;resize:none;outline:none;-webkit-appearance:none;transition:border-color .15s}
textarea:focus{border-color:var(--accent)}
textarea::placeholder{color:var(--sub);opacity:.7}
.mw{padding:0 16px 14px;border-top:1px solid var(--border)}
.mw label{display:block;font-size:13px;color:var(--sub);margin:12px 0 6px}
input[type=text]{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:inherit;font-size:15px;padding:10px 12px;outline:none;-webkit-appearance:none;transition:border-color .15s}
input[type=text]:focus{border-color:var(--accent)}
input[type=text]::placeholder{color:var(--sub);opacity:.7}
.blist{padding:6px 0}
.bitem{display:flex;align-items:center;gap:14px;padding:13px 16px;border-bottom:1px solid var(--border);cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none}
.bitem:last-child{border-bottom:none}
.bitem:active{background:var(--border)}
.cbox{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);background:var(--surface);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:background .15s,border-color .15s}
.bitem.checked .cbox{background:var(--accent);border-color:var(--accent)}
.cbox svg{display:none}.bitem.checked .cbox svg{display:block}
.binfo{flex:1;min-width:0}
.bname{font-size:15px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bareas{font-size:12px;color:var(--sub);margin-top:1px}
.sar{display:flex;justify-content:flex-end;gap:12px;padding:0 4px 6px}
.sar button{background:none;border:none;color:var(--accent-lt);font-size:13px;padding:4px 6px;cursor:pointer}
footer{padding:16px 16px 0}
.bgen{width:100%;padding:17px;background:var(--accent);color:white;border:none;border-radius:var(--radius);font-family:inherit;font-size:17px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .15s,transform .1s}
.bgen:active{background:#3a6a96;transform:scale(.98)}
.bgen:disabled{background:var(--border);color:var(--sub);transform:none}
#toast{position:fixed;bottom:calc(var(--safe-bot) + 80px);left:50%;transform:translateX(-50%) translateY(20px);background:#1e2a3a;border:1px solid var(--border);color:var(--text);font-size:14px;padding:10px 18px;border-radius:100px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:999}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#spin{display:none;position:fixed;inset:0;background:rgba(10,15,25,.75);align-items:center;justify-content:center;z-index:1000;flex-direction:column;gap:14px}
#spin.show{display:flex}
.sring{width:44px;height:44px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
#spin p{color:var(--sub);font-size:14px}
#bd{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;backdrop-filter:blur(4px)}
#bd.show{display:block}
#sh{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-radius:20px 20px 0 0;border-top:1px solid var(--border);z-index:600;padding:0 0 calc(var(--safe-bot) + 16px);transform:translateY(100%);transition:transform .35s cubic-bezier(.32,.72,0,1);max-height:90dvh;overflow-y:auto}
#sh.show{transform:translateY(0)}
.hdl{width:36px;height:4px;background:var(--border);border-radius:2px;margin:10px auto 16px}
.stitle{font-size:17px;font-weight:600;padding:0 20px 14px;border-bottom:1px solid var(--border)}
.ssub{font-size:12px;color:var(--sub);font-weight:400;display:block;margin-top:2px}
.eitems{padding:8px 0}
.eitem{padding:14px 20px;border-bottom:1px solid var(--border)}
.eitem:last-child{border-bottom:none}
.erow{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px}
.ename{font-size:15px;font-weight:500}
.eto{font-size:12px;color:var(--sub);margin-top:1px}
.ebtns{display:flex;gap:8px;flex-shrink:0}
.bpdf,.bmail{padding:9px 16px;border:none;border-radius:100px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent;white-space:nowrap;text-decoration:none;display:inline-block}
.bpdf{background:var(--accent);color:white}
.bmail{background:var(--green);color:white;display:none}
.ehint{font-size:12px;color:var(--green-lt);display:none;margin-top:4px}
.ehint.show{display:block}
.sfooter{padding:16px 20px 0;display:flex;gap:10px}
.bdone{flex:1;padding:14px;background:var(--card);color:var(--sub);border:1px solid var(--border);border-radius:var(--radius);font-family:inherit;font-size:16px;cursor:pointer}
.ball{flex:2;padding:14px;background:var(--green);color:white;border:none;border-radius:var(--radius);font-family:inherit;font-size:16px;font-weight:600;cursor:pointer}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="eyebrow">Damon Legal Services Ltd.</div>
    <h1>Execution Search</h1>
    <p>Generate and send letters to BC court bailiffs</p>
  </header>
  <main>
    <div class="slabel">Party Names</div>
    <div class="card">
      <div class="nw">
        <label>One name per line — appears uppercased in the Re: line</label>
        <textarea id="names" placeholder="e.g. Smith, John&#10;Acme Holdings Ltd." autocorrect="off" autocapitalize="words" spellcheck="false"></textarea>
      </div>
      <div class="mw">
        <label>Matter / File reference <span style="color:var(--sub);font-weight:400">(optional)</span></label>
        <input type="text" id="matter" placeholder="e.g. Lender v. Borrower" autocorrect="off">
      </div>
    </div>
    <div class="slabel" style="margin-top:4px">Bailiff Offices</div>
    <div class="sar"><button onclick="selectAll()">Select all</button><button onclick="clearAll()">Clear</button></div>
    <div class="card"><div class="blist" id="blist"></div></div>
  </main>
  <footer><button class="bgen" onclick="generate()">Generate Letters</button></footer>
</div>
<div id="spin"><div class="sring"></div><p>Generating PDFs…</p></div>
<div id="toast"></div>
<div id="bd" onclick="closeSheet()"></div>
<div id="sh">
  <div class="hdl"></div>
  <div class="stitle">Send Letters<span class="ssub" id="ssub"></span></div>
  <div class="eitems" id="eitems"></div>
  <div class="sfooter">
    <button class="bdone" onclick="closeSheet()">Done</button>
    <button class="ball" onclick="openAll()">Open All PDFs</button>
  </div>
</div>

<script>
const OFFICES=[
  {key:"consolidated_vic", label:"Consolidated \u2014 Victoria",      addr:["Consolidated Civil Enforcement BC Inc.","300-848 Courtney Street","Victoria, B.C., V8W 1C4"],          email:"bcsearches@ccebailiff.ca",            area:"areas 1, 2 & 3"},
  {key:"canada_west",      label:"Canada West",                        addr:["Canada West Court Bailiffs Ltd.","25019-35-1800 Tranquille Rd","Kamloops, B.C., V2B 8R6"],              email:"cwcb@telus.net",                      area:"areas 1, 2, 3, 7, 8 & 12"},
  {key:"accurate",         label:"Accurate Court Bailiff",             addr:["Accurate Court Bailiff Services Ltd.","6139 Trapp Avenue","Burnaby, B.C., V3N 2V3"],                   email:"support@aebailiffs.com",              area:"areas 4, 5 & 6"},
  {key:"integrated",       label:"Integrated Civil Enforcement",       addr:["Integrated Civil Enforcement","101B-625 Agnes St","New Westminster, B.C., V3M 5Y4"],                   email:"searches@integratedcivil.ca",         area:"areas 4, 5 & 6"},
  {key:"consolidated_nw",  label:"Consolidated \u2014 New Westminster",addr:["Consolidated Civil Enforcement BC Inc.","611 Agnes Street","New Westminster, B.C., V3M 1G9"],          email:"bcsearches@ccebailiff.ca",            area:"areas 4, 5 & 6"},
  {key:"north_central",    label:"North Central Bailiffs",             addr:["North Central Bailiffs Ltd.","2900 East Boundary Rd #101A","West Kelowna, B.C., V4T 3K5"],            email:"headoffice@northcentralbailiffs.bc.ca",area:"areas 7, 8, 9, 10, 11 & 12"},
  {key:"expert",           label:"Expert Bailiff",                     addr:["Expert Bailiff & Collection Services Ltd.","10315 - 100 Ave","Fort St. John, B.C., V1J 1Y8"],         email:"reception.expert@gmail.com",          area:"area 11"},
];

const checked=new Set();
const pdfs={};

// ── Bailiff list ──────────────────────────────────────────────────────────────
function buildList(){
  const list=document.getElementById("blist");
  OFFICES.forEach(o=>{
    const el=document.createElement("div");
    el.className="bitem"; el.dataset.key=o.key;
    el.innerHTML=`<div class="cbox"><svg width="13" height="10" viewBox="0 0 13 10" fill="none"><path d="M1.5 5L5 8.5L11.5 1.5" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div class="binfo"><div class="bname">${o.label}</div><div class="bareas">${o.area}</div></div>`;
    el.addEventListener("click",()=>{checked.has(o.key)?(checked.delete(o.key),el.classList.remove("checked")):(checked.add(o.key),el.classList.add("checked"))});
    list.appendChild(el);
  });
}
function selectAll(){OFFICES.forEach(o=>{checked.add(o.key);document.querySelector(`[data-key="${o.key}"]`).classList.add("checked");})}
function clearAll(){OFFICES.forEach(o=>{checked.delete(o.key);document.querySelector(`[data-key="${o.key}"]`).classList.remove("checked");})}

// ── Date (Vancouver) ──────────────────────────────────────────────────────────
function todayVan(){
  return new Date(new Date().toLocaleString("en-US",{timeZone:"America/Vancouver"}))
    .toLocaleDateString("en-US",{year:"numeric",month:"long",day:"numeric"});
}

const SIG_W   = 13140;

// Times-Roman per-char widths (fraction of point size, from PDF spec)
const TR_W = {' ':0.250,',':0.250,'.':0.250,':':0.277,';':0.277,"'":0.277,
  '(':0.333,')':0.333,'/':0.277,'-':0.333,'&':0.778,
  'a':0.444,'b':0.500,'c':0.444,'d':0.500,'e':0.444,'f':0.333,
  'g':0.500,'h':0.500,'i':0.278,'j':0.278,'k':0.500,'l':0.278,
  'm':0.778,'n':0.500,'o':0.500,'p':0.500,'q':0.500,'r':0.333,
  's':0.389,'t':0.278,'u':0.500,'v':0.500,'w':0.722,'x':0.500,
  'y':0.500,'z':0.444,
  'A':0.722,'B':0.667,'C':0.667,'D':0.722,'E':0.611,'F':0.556,
  'G':0.722,'H':0.722,'I':0.333,'J':0.389,'K':0.722,'L':0.611,
  'M':0.889,'N':0.722,'O':0.722,'P':0.556,'Q':0.722,'R':0.667,
  'S':0.556,'T':0.611,'U':0.722,'V':0.722,'W':0.944,'X':0.722,
  'Y':0.722,'Z':0.611,
  '0':0.500,'1':0.500,'2':0.500,'3':0.500,'4':0.500,
  '5':0.500,'6':0.500,'7':0.500,'8':0.500,'9':0.500};

function strW(s, size) {
  let w = 0;
  for (const c of s) w += (TR_W[c] || 0.500) * size;
  return w;
}

function wrapText(s, tw) {
  const words = s.split(' ');
  const lines = []; let cur = '';
  words.forEach(w => {
    const test = cur ? cur + ' ' + w : w;
    if (strW(test, 11) <= tw) { cur = test; }
    else { if (cur) lines.push(cur); cur = w; }
  });
  if (cur) lines.push(cur);
  return lines;
}

function buildPDF(names, office, dateStr) {
  const inch = 72, W = 612, H = 792;
  const LM   = 1.0 * inch;
  const TW   = W - 2.0 * inch;
  const LINE = 0.185 * inch;
  const PARA = LINE * 2.2;

  const ops = [];
  const enc = new TextEncoder();

  function esc(s) { return s.replace(/\\/g,'\\\\').replace(/\(/g,'\\(').replace(/\)/g,'\\)'); }
  function txt(s, x, y, font, size) {
    ops.push('BT /' + font + ' ' + size + ' Tf ' + x.toFixed(2) + ' ' + y.toFixed(2) + ' Td (' + esc(s) + ') Tj ET');
  }
  function ctr(s, y, font, size) {
    const w = strW(s, size);
    txt(s, (W - w) / 2, y, font, size);
  }
  function rule(y) {
    ops.push('0.55 0.55 0.55 RG 0.5 w ' + LM.toFixed(2) + ' ' + y.toFixed(2) + ' m ' + (W-LM).toFixed(2) + ' ' + y.toFixed(2) + ' l S 0 0 0 RG 1 w');
  }

  let y = H - 0.9 * inch;

  // Letterhead
  ctr('DAMON LEGAL SERVICES LTD.', y, 'Tb', 12); y -= LINE * 1.3;
  ctr('300 - 1122 Mainland Street', y, 'Tr', 10); y -= LINE;
  ctr('Vancouver, B.C., V6B 5L1',  y, 'Tr', 10); y -= LINE;
  ctr('TEL: (604) 904-6501  FAX: (604) 904-6502', y, 'Tr', 10);
  y -= LINE * 0.5;
  rule(y); y -= LINE * 1.2;

  // Date
  txt(dateStr, LM, y, 'Tr', 11); y -= PARA;

  // Recipient
  office.addr.forEach(l => { txt(l, LM, y, 'Tr', 11); y -= LINE; });
  y -= LINE * 0.5;

  // Salutation
  txt('Dear Sirs:', LM, y, 'Tr', 11); y -= PARA;

  // Re: block
  const rePrefix = 'Re:   ';
  const prefixW  = strW(rePrefix, 11);
  txt(rePrefix + names[0].toUpperCase(), LM, y, 'Tb', 11);
  for (let i = 1; i < names.length; i++) { y -= LINE; txt(names[i].toUpperCase(), LM + prefixW, y, 'Tb', 11); }
  y -= PARA;

  // Body
  const creditor = 'Creditor’s';
  const body = 'We request that you search the Parties in your records in ' + office.area +
    ' for any outstanding Writs of Seizure and Sale, Writs of Sequestration, Writs of Possession, ' +
    'Writs of Delivery, Writs of Fieri Facias, Attachments, or any other Writs or Warrants of ' +
    'Execution issued against the Parties and Individual.  In addition, we request that you search ' +
    'the Parties for any filings or entries made in the ' + creditor + ' Relief Book kept pursuant ' +
    'to the Creditor Assistance Act.';
  wrapText(body, TW).forEach(l => { txt(l, LM, y, 'Tr', 11); y -= LINE; });
  y -= LINE;

  // Closing
  txt('Thank you for your assistance.', LM, y, 'Tr', 11); y -= PARA;
  txt('Yours very truly,', LM, y, 'Tr', 11); y -= LINE * 2.0;

  const firmY = y;
  const perY  = firmY - 0.52 * inch;
  const nameY = perY - LINE;

  // Signature image (before text so text renders on top)
  const sigDispW = 1.0 * inch;
  const sigDispH = sigDispW * 0.55;
  const sigX = LM + 14;
  const sigY = perY - 4;
  ops.push('q ' + sigDispW.toFixed(2) + ' 0 0 ' + sigDispH.toFixed(2) + ' ' + sigX.toFixed(2) + ' ' + sigY.toFixed(2) + ' cm /Sig Do Q');

  // Firm / Per / Name text on top
  txt('DAMON LEGAL SERVICES LTD.', LM, firmY, 'Tr', 11);
  txt('Per:', LM, perY, 'Tr', 11);
  txt('        Damon J. Wong', LM, nameY, 'Tr', 11);

  // Build PDF byte array
  const streamStr   = ops.join('\n');
  const streamBytes = enc.encode(streamStr);

  // Decode signature JPEG bytes
  const sigBin = atob(SIG_B64);
  const sigBytes = new Uint8Array(sigBin.length);
  for (let i = 0; i < sigBin.length; i++) sigBytes[i] = sigBin.charCodeAt(i);

  const parts = [];
  const pushS = s => parts.push(enc.encode(s));
  const pushB = b => parts.push(b);

  pushS('%PDF-1.4\n');

  const offsets = {};
  function obj(n, hdr, extra, ftr) {
    offsets[n] = parts.reduce((a,p) => a + p.length, 0);
    pushS(n + ' 0 obj\n' + hdr);
    if (extra) pushB(extra);
    if (ftr) pushS(ftr);
    pushS('\nendobj\n');
  }

  obj(1, '<< /Type /Catalog /Pages 2 0 R >>');
  obj(2, '<< /Type /Pages /Kids [3 0 R] /Count 1 >>');
  obj(3,
    '<< /Type /Page /Parent 2 0 R /MediaBox [0 0 612 792]\n' +
    '   /Contents 4 0 R\n' +
    '   /Resources <<\n' +
    '     /Font << /Tr 5 0 R /Tb 6 0 R >>\n' +
    '     /XObject << /Sig 7 0 R >>\n' +
    '   >> >>');

  // Content stream (obj 4)
  offsets[4] = parts.reduce((a,p) => a + p.length, 0);
  pushS('4 0 obj\n<< /Length ' + streamBytes.length + ' >>\nstream\n');
  pushB(streamBytes);
  pushS('\nendstream\nendobj\n');

  obj(5, '<< /Type /Font /Subtype /Type1 /BaseFont /Times-Roman /Encoding /WinAnsiEncoding >>');
  obj(6, '<< /Type /Font /Subtype /Type1 /BaseFont /Times-Bold /Encoding /WinAnsiEncoding >>');

  // Signature image XObject (obj 7)
  offsets[7] = parts.reduce((a,p) => a + p.length, 0);
  const imgHdr = '7 0 obj\n<< /Type /XObject /Subtype /Image /Width 400 /Height 220' +
    ' /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length ' + sigBytes.length + ' >>\nstream\n';
  pushS(imgHdr);
  pushB(sigBytes);
  pushS('\nendstream\nendobj\n');

  // xref + trailer
  const xrefPos = parts.reduce((a,p) => a + p.length, 0);
  let xr = 'xref\n0 8\n0000000000 65535 f \n';
  for (let n = 1; n <= 7; n++) xr += String(offsets[n]).padStart(10,'0') + ' 00000 n \n';
  pushS(xr + 'trailer\n<< /Size 8 /Root 1 0 R >>\nstartxref\n' + xrefPos + '\n%%EOF\n');

  // Merge
  const total = parts.reduce((a,p) => a + p.length, 0);
  const buf = new Uint8Array(total);
  let pos = 0;
  parts.forEach(p => { buf.set(p, pos); pos += p.length; });

  const blob = new Blob([buf], { type: 'application/pdf' });
  return URL.createObjectURL(blob);
}

// ── Generate ──────────────────────────────────────────────────────────────────
function generate(){
  const raw=document.getElementById("names").value.trim();
  if(!raw){showToast("Enter at least one party name");return;}
  if(!checked.size){showToast("Select at least one bailiff office");return;}

  const names=raw.split("\n").map(n=>n.trim()).filter(Boolean);
  const matter=document.getElementById("matter").value.trim();
  const date=todayVan();
  const subject="Execution Search \u2014 "+(matter||names.join(", "));
  const selected=OFFICES.filter(o=>checked.has(o.key));

  showSpin(true);
  setTimeout(()=>{
    try{
      selected.forEach(o=>{
        const safe=(matter||names[0].replace(/,/g,"").replace(/\s+/g,"_")).substring(0,30);
        const filename=safe+"_"+o.key+".pdf";
        const dataUrl=buildPDF(names,o,date);
        pdfs[o.key]={dataUrl,filename,office:o,subject};
      });
      showSpin(false);
      openSheet(selected,subject);
    }catch(e){
      showSpin(false);
      showToast("Error: "+e.message);
      console.error(e);
    }
  },50);
}

// ── Sheet ─────────────────────────────────────────────────────────────────────
function openSheet(offices,subject){
  document.getElementById("ssub").textContent=offices.length+" letter"+(offices.length>1?"s":"")+" ready";
  const c=document.getElementById("eitems");
  c.innerHTML="";
  offices.forEach(o=>{
    const {dataUrl,filename,subject:subj}=pdfs[o.key];
    const bodyEnc=encodeURIComponent("Please find the execution search attached for your records.\n\nThank you,\nDamon");
    const subjEnc=encodeURIComponent(subj);
    const mailto=`mailto:${o.email}?subject=${subjEnc}&body=${bodyEnc}`;
    const el=document.createElement("div");
    el.className="eitem";
    el.innerHTML=`
      <div class="erow">
        <div><div class="ename">${o.label}</div><div class="eto">${o.email}</div></div>
        <div class="ebtns">
          <a class="bpdf" href="${dataUrl}" download="${filename}" id="pdf-${o.key}" onclick="pdfTapped('${o.key}')">📄 PDF</a>
          <a class="bmail" href="${mailto}" id="mail-${o.key}">✉ Mail</a>
        </div>
      </div>
      <div class="ehint" id="hint-${o.key}">PDF saved to Downloads &#8594; tap ✉ Mail to compose email</div>`;
    c.appendChild(el);
  });
  document.getElementById("bd").classList.add("show");
  setTimeout(()=>document.getElementById("sh").classList.add("show"),10);
}

function pdfTapped(key){
  setTimeout(()=>{
    document.getElementById("mail-"+key).style.display="inline-block";
    document.getElementById("hint-"+key).classList.add("show");
  },400);
}

function closeSheet(){
  document.getElementById("sh").classList.remove("show");
  document.getElementById("bd").classList.remove("show");
}

function openAll(){
  document.querySelectorAll("a.bpdf").forEach((a,i)=>setTimeout(()=>a.click(),i*600));
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function showSpin(on){document.getElementById("spin").classList.toggle("show",on);}
let _tt;
function showToast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;t.classList.add("show");
  clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove("show"),2800);
}

buildList();
